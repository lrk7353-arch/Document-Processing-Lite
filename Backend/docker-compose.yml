version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: document_agent_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent_service:
    build: .
    container_name: document_agent_service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - ALGORITHM_API_URL=${ALGORITHM_API_URL}
      - ALGORITHM_SERVICE_TOKEN=${ALGORITHM_SERVICE_TOKEN}
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
      - BACKEND_CALLBACK_BASE=http://document_agent_service:8000
    ports:
      - "8000:8000"
    volumes:
      - ./agent:/app/agent
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  algorithm_service:
    build:
      context: ../Algorithm
    container_name: invoice_algorithm_service
    restart: always
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - DEBUG_MODE=false
      - SERVICE_TOKEN=${ALGORITHM_SERVICE_TOKEN}
      - TESSERACT_CMD=/usr/bin/tesseract
    ports:
      - "8001:8001"
    depends_on:
      - agent_service
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ../Frontend/Document Processing Intelligent Agent
    container_name: document_agent_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - agent_service

volumes:
  postgres_data: